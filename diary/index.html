<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日記帳</title>
<style>
body {
  font-family: sans-serif;
  background: #0f0f14;
  color: #fff;
  padding: 20px;
}
h1 {
  color: #c084fc;
}
input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}
button {
  background: #7c3aed;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}
button:hover {
  background: #a78bfa;
}
.entry {
  background: #1a1a22;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
.small {
  color: #aaa;
  font-size: 12px;
}
.delete {
  margin-top: 5px;
  background: #ef4444;
}
</style>
</head>
<body>

<h1>日記帳</h1>

<input type="date" id="date">
<textarea id="content" placeholder="今日はどんな一日でしたか？"></textarea>
<button onclick="addEntry()">記録する</button>

<h2>履歴</h2>
<div id="entries"></div>

<script>
function loadEntries() {
  const entries = JSON.parse(localStorage.getItem("diary") || "[]");
  const container = document.getElementById("entries");
  container.innerHTML = "";

  entries.reverse().forEach((entry, index) => {
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <div class="small">${entry.date}</div>
      <div>${entry.content}</div>
      <button class="delete" onclick="deleteEntry(${entries.length - 1 - index})">削除</button>
    `;

    container.appendChild(div);
  });
}

function addEntry() {
  const date = document.getElementById("date").value;
  const content = document.getElementById("content").value;

  if (!date || !content) {
    alert("日付と内容を入力してください");
    return;
  }

  const entries = JSON.parse(localStorage.getItem("diary") || "[]");
  entries.push({ date, content });

  localStorage.setItem("diary", JSON.stringify(entries));

  document.getElementById("content").value = "";
  loadEntries();
}

function deleteEntry(index) {
  const entries = JSON.parse(localStorage.getItem("diary") || "[]");
  entries.splice(index, 1);
  localStorage.setItem("diary", JSON.stringify(entries));
  loadEntries();
}

loadEntries();
</script>

</body>
</html>
