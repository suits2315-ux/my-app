<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>家計簿アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; background:#0f0f14; color:#eee; }
h2 { margin-bottom: 10px; }
input, select, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #333;
  font-size: 16px;
  background:#1a1a24;
  color:#eee;
}
button { background: #6c3cff; color: white; border: none; }
.container { max-width: 420px; margin: auto; }
.card { background: #1a1a24; padding: 12px; margin-top: 12px; border-radius: 10px; box-shadow: 0 2px 8px rgba(108,60,255,0.2); }
ul { padding-left: 18px; }
.total { font-size:18px; margin-top:10px; }
.delete-btn { background:#ff4d6d; margin-left:10px; padding:4px 8px; font-size:12px; }

/* フォーカス時の視認性改善 */
input:focus, select:focus {
  outline: none;
  border-color: #9b6cff;
  color: #c3a6ff;
  caret-color: #c3a6ff;
}

/* プレースホルダーも少し柔らかく */
input::placeholder {
  color: #777;
}
</style>
</head>
<body>

<div class="container">
<h2>家計簿</h2>

<input type="month" id="monthPicker" />

<input type="date" id="date" />
<input type="number" id="amount" placeholder="金額（¥）" />

<select id="category">
<option value="食品・日用品">食品・日用品</option>
<option value="家族との外食や娯楽費用">家族との外食や娯楽費用</option>
<option value="個人使用">個人使用</option>
<option value="エマ費用">エマ費用</option>
</select>

<button onclick="addRecord()">追加</button>

<div class="card">
<h3>今月の合計</h3>
<div id="monthlyTotal" class="total"></div>
</div>

<div class="card">
<h3>履歴</h3>
<ul id="list"></ul>
</div>

<div class="card">
<h3>カテゴリ別支出</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let records = JSON.parse(localStorage.getItem('records')) || [];
let selectedMonth = new Date();

function save() { localStorage.setItem('records', JSON.stringify(records)); }

function addRecord() {
  const date = document.getElementById('date').value;
  const amount = Number(document.getElementById('amount').value);
  const category = document.getElementById('category').value;

  if (!date || !amount) { alert("日付と金額を入力してください"); return; }

  records.push({ date, amount, category });
  save();
  render();
}

function deleteRecord(index) {
  records.splice(index, 1);
  save();
  render();
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  const categoryTotals = {};
  let monthlyTotal = 0;

  const year = selectedMonth.getFullYear();
  const month = selectedMonth.getMonth();

  records.forEach((r, i) => {
    const recordDate = new Date(r.date);

    if (recordDate.getFullYear() === year && recordDate.getMonth() === month) {
      const li = document.createElement('li');

      // 日付を yyyy/mm/dd に整形
      const d = new Date(r.date);
      const formattedDate = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;

      li.innerHTML = `${formattedDate} ${r.category} -¥${r.amount.toLocaleString()} <button class='delete-btn' onclick='deleteRecord(${i})'>削除</button>`;
      list.appendChild(li);

      monthlyTotal += r.amount;

      if (!categoryTotals[r.category]) categoryTotals[r.category] = 0;
      categoryTotals[r.category] += r.amount;
    }
  });

  document.getElementById('monthlyTotal').textContent = `¥${monthlyTotal.toLocaleString()}`;

  drawChart(categoryTotals);
}

let chart;
function drawChart(categoryTotals) {
  const ctx = document.getElementById('chart').getContext('2d');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: Object.keys(categoryTotals),
      datasets: [{
        data: Object.values(categoryTotals),
        backgroundColor: ['#6c3cff','#9b6cff','#c3a6ff','#4b2dbd']
      }]
    }
  });
}

// 初期設定
const now = new Date();
document.getElementById('date').valueAsDate = now;
document.getElementById('monthPicker').value = now.toISOString().slice(0,7);

// 月変更イベント
document.getElementById('monthPicker').addEventListener('change', (e) => {
  selectedMonth = new Date(e.target.value);
  render();
});

render();
</script>

</body>
</html>
